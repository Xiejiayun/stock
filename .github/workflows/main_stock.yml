name: Build and deploy Python app to Azure Web App - stock

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: stock
  STARTUP_COMMAND: cd /home/site/wwwroot/backend && gunicorn main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy frontend build to backend/static
        run: |
          rm -rf backend/static
          mv frontend/dist backend/static

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Validate Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Create deployment package
        run: zip -r deploy.zip backend/ requirements.txt startup.sh -x '__pycache__/*' '*.pyc'

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E2173B23F04C43A2AB24EEDECC1E85F3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A99C600DE4DD44DBAB0032A1C355F9FF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FB3CE3B82EBC4CDCB89393013BA6972E }}

      - name: Resolve App Service resource group
        id: app
        run: |
          resource_group=$(az webapp list --query "[?name=='${AZURE_WEBAPP_NAME}'].resourceGroup | [0]" -o tsv)
          if [ -z "$resource_group" ]; then
            echo "Unable to find App Service '${AZURE_WEBAPP_NAME}' in the logged-in subscription." >&2
            exit 1
          fi
          echo "resource_group=$resource_group" >> "$GITHUB_OUTPUT"

      - name: Configure App Service runtime and startup command
        run: |
          az webapp config set \
            --resource-group "${{ steps.app.outputs.resource_group }}" \
            --name "$AZURE_WEBAPP_NAME" \
            --linux-fx-version "PYTHON|3.11" \
            --startup-file "$STARTUP_COMMAND"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: deploy.zip

      - name: Verify health endpoint
        run: |
          url="${{ steps.deploy-to-webapp.outputs.webapp-url }}/api/health"
          for attempt in {1..12}; do
            if curl --fail --silent --show-error "$url"; then
              exit 0
            fi
            sleep 10
          done
          curl --fail --silent --show-error "$url"
