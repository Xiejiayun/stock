name: Build and deploy Python app to Azure Web App - stock

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: stock
  STARTUP_COMMAND: bash /home/site/wwwroot/startup.sh

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy frontend build to backend/static
        run: |
          rm -rf backend/static
          mv frontend/dist backend/static

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies into deployment package
        run: |
          python -m pip install --upgrade pip
          python -m pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Validate FastAPI app import
        run: PYTHONPATH=".python_packages/lib/site-packages:backend" python -c "import main; print('ok')"

      - name: Create deployment package
        run: zip -r deploy.zip backend/ .python_packages/ requirements.txt startup.sh -x '__pycache__/*' '*.pyc'

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E2173B23F04C43A2AB24EEDECC1E85F3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A99C600DE4DD44DBAB0032A1C355F9FF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FB3CE3B82EBC4CDCB89393013BA6972E }}

      - name: Resolve App Service resource group
        id: app
        run: |
          resource_group=$(az webapp list --query "[?name=='${AZURE_WEBAPP_NAME}'].resourceGroup | [0]" -o tsv)
          if [ -z "$resource_group" ]; then
            echo "Unable to find App Service '${AZURE_WEBAPP_NAME}' in the logged-in subscription." >&2
            exit 1
          fi
          echo "resource_group=$resource_group" >> "$GITHUB_OUTPUT"

      - name: Configure App Service runtime and startup command
        run: |
          resource_group="${{ steps.app.outputs.resource_group }}"
          changed=false

          current_runtime=$(az webapp config show \
            --resource-group "$resource_group" \
            --name "$AZURE_WEBAPP_NAME" \
            --query linuxFxVersion -o tsv)
          current_startup=$(az webapp config show \
            --resource-group "$resource_group" \
            --name "$AZURE_WEBAPP_NAME" \
            --query appCommandLine -o tsv)

          if [ "$current_runtime" != "PYTHON|3.11" ] || [ "$current_startup" != "$STARTUP_COMMAND" ]; then
            az webapp config set \
              --resource-group "$resource_group" \
              --name "$AZURE_WEBAPP_NAME" \
              --linux-fx-version "PYTHON|3.11" \
              --startup-file "$STARTUP_COMMAND"
            changed=true
          fi

          current_scm_build=$(az webapp config appsettings list \
            --resource-group "$resource_group" \
            --name "$AZURE_WEBAPP_NAME" \
            --query "[?name=='SCM_DO_BUILD_DURING_DEPLOYMENT'].value | [0]" -o tsv)
          current_oryx_build=$(az webapp config appsettings list \
            --resource-group "$resource_group" \
            --name "$AZURE_WEBAPP_NAME" \
            --query "[?name=='ENABLE_ORYX_BUILD'].value | [0]" -o tsv)
          current_websites_port=$(az webapp config appsettings list \
            --resource-group "$resource_group" \
            --name "$AZURE_WEBAPP_NAME" \
            --query "[?name=='WEBSITES_PORT'].value | [0]" -o tsv)
          current_port=$(az webapp config appsettings list \
            --resource-group "$resource_group" \
            --name "$AZURE_WEBAPP_NAME" \
            --query "[?name=='PORT'].value | [0]" -o tsv)

          if [ "$current_scm_build" != "false" ] || [ "$current_oryx_build" != "false" ] || [ "$current_websites_port" != "8000" ] || [ "$current_port" != "8000" ]; then
            az webapp config appsettings set \
              --resource-group "$resource_group" \
              --name "$AZURE_WEBAPP_NAME" \
              --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false WEBSITES_PORT=8000 PORT=8000
            changed=true
          fi

          if [ "$changed" = true ]; then
            echo "App Service configuration changed; waiting for SCM to restart."
            sleep 90
          else
            echo "App Service configuration already matches desired deployment settings."
          fi

      - name: Deploy to Azure Web App
        run: |
          resource_group="${{ steps.app.outputs.resource_group }}"
          az webapp deploy \
            --resource-group "$resource_group" \
            --name "$AZURE_WEBAPP_NAME" \
            --src-path deploy.zip \
            --type zip \
            --clean true \
            --restart false \
            --track-status false
          az webapp restart \
            --resource-group "$resource_group" \
            --name "$AZURE_WEBAPP_NAME"

      - name: Verify health endpoint
        run: |
          resource_group="${{ steps.app.outputs.resource_group }}"
          host_name=$(az webapp show \
            --resource-group "$resource_group" \
            --name "$AZURE_WEBAPP_NAME" \
            --query defaultHostName -o tsv)
          url="https://${host_name}/api/health"
          for attempt in {1..30}; do
            if curl --fail --silent --show-error "$url"; then
              exit 0
            fi
            sleep 10
          done
          curl --fail --silent --show-error "$url"

      - name: Show startup logs on failure
        if: failure()
        run: |
          az webapp log config \
            --resource-group "${{ steps.app.outputs.resource_group }}" \
            --name "$AZURE_WEBAPP_NAME" \
            --docker-container-logging filesystem
          az webapp log startup show \
            --resource-group "${{ steps.app.outputs.resource_group }}" \
            --name "$AZURE_WEBAPP_NAME"
